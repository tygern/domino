name: Test and Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: |
          go vet ./...
          go test ./...
          go build -o domino ./cmd/domino

      - uses: actions/upload-artifact@v4
        with:
          name: domino
          path: domino
